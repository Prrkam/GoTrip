<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="./css/main.css">
    <link rel="shortcut icon" href="./imgs/logo-color.svg" type="image/x-icon">
</head>
<body>
    <header class="header">
        <div class="container">

                    <ul class="header__list">
                        <li class="header__list-item">
                            <a href="#" class="header__list-link active">

                            </a>
                        </li>
                        <li class="header__list-item">
                            <a href="#" class="header__list-link">
